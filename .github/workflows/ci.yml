name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test (Dart ${{ matrix.dart }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dart: ["3.0", "3.3", stable]
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.dart }}
      - run: dart pub get
      - name: Analyze
        run: dart analyze lib/
      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib/
      - name: Test
        run: dart test test/ -r expanded

  pub-score:
    name: pub.dev score check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: pana dry-run
        run: |
          dart pub global activate pana
          dart pub global run pana --no-warning . || true
