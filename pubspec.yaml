name: pretext
description: >-
  Dart port of pretext — pure-arithmetic multiline text layout with
  variable per-line widths (layoutNextLine). Pure Dart core, Flutter
  convenience layer. Inspired by github.com/chenglou/pretext.
version: 0.1.0
homepage: https://github.com/chenglou/pretext

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  characters: ^1.3.0

dev_dependencies:
  flutter:
    sdk: flutter
  flutter_test:
    sdk: flutter
  test: ^1.24.0
  lints: ^3.0.0
