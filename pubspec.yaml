name: pretext
description: >-
  Dart port of pretext — pure-arithmetic multiline text layout with
  variable per-line widths (layoutNextLine). Pure Dart core, Flutter
  convenience layer. Inspired by github.com/chenglou/pretext.
version: 0.1.0
homepage: https://github.com/craigm26/pretext_dart
repository: https://github.com/craigm26/pretext_dart
issue_tracker: https://github.com/craigm26/pretext_dart/issues

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  characters: ^1.3.0

dev_dependencies:
  test: ^1.24.0
  lints: ^3.0.0

# Flutter convenience layer (flutter/pretext_flutter.dart) is not tested here.
# Downstream Flutter apps bring their own SDK dependency.
# To run Flutter-specific tests locally:
#   flutter test (requires Flutter SDK installed)
